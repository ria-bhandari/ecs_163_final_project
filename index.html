<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Temperature Map</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

    <div id="controls">
        <h2>Global Land Average Temperature</h2>
        <p class="subtitle">Colors show the 5-year average of change vs. 30 years earlier (red = warmed, blue = cooled). Zoom in for major cities</p>
        <div class="slider-container">
            <label for="yearSlider">Year: <span id="yearLabel">2000</span></label>
            <input type="range" id="yearSlider" min="1784" max="2013" value="2000" step="1">
        </div>
    </div>

    <div id="viz-wrapper">
        <div id="map-container"></div>
        <aside id="legend">
            <div class="legend-title">5-yr avg Δ vs 30 yrs ago (°C)</div>
            <div class="legend-bar-row">
                <div class="legend-labels">
                    <span class="legend-warm">Warmed</span>
                    <span class="legend-cool">Cooled</span>
                </div>
                <svg id="colorbar-svg"></svg>
            </div>
        </aside>
    </div>

    <div id="tooltip" class="tooltip" style="opacity: 0;"></div>

    <script src="main.js"></script>
</body>
</html>
