<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Temperature Map</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

    <div id="controls">
        <h2>Global Land Average Temperature by Country</h2>
        <div class="slider-container">
            <label for="yearSlider">Year: <span id="yearLabel">2000</span></label>
            <input type="range" id="yearSlider" min="1750" max="2013" value="2000" step="1">
        </div>
    </div>

    <div id="map-container"></div>
    
    <div id="tooltip" class="tooltip" style="opacity: 0;"></div>

    <script src="main.js"></script>
</body>
</html>
